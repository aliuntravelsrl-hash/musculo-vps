events { worker_connections 1024; }

http {
  # ─── Upstream services ───────────────────────────────────────
  upstream antigravity {
    server antigravity:3000;
  }

  upstream atlas_marketing {
    server atlas_marketing:4000;
  }

  # ─── Rate limiting (protección básica) ───────────────────────
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

  # ─── antigravity.aliuntravelsrl.com ──────────────────────────
  server {
    listen 80;
    server_name antigravity.aliuntravelsrl.com;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name antigravity.aliuntravelsrl.com;

    ssl_certificate     /etc/nginx/ssl/aliuntravelsrl.crt;
    ssl_certificate_key /etc/nginx/ssl/aliuntravelsrl.key;

    location /api/ {
      limit_req zone=api_limit burst=10 nodelay;
      proxy_pass http://antigravity;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 90s;    # Gemini puede tardar hasta 30s
    }

    location /health {
      proxy_pass http://antigravity;
      access_log off;
    }
  }

  # ─── marketing.aliuntravelsrl.com ────────────────────────────
  server {
    listen 80;
    server_name marketing.aliuntravelsrl.com;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name marketing.aliuntravelsrl.com;

    ssl_certificate     /etc/nginx/ssl/aliuntravelsrl.crt;
    ssl_certificate_key /etc/nginx/ssl/aliuntravelsrl.key;

    location /api/ {
      limit_req zone=api_limit burst=10 nodelay;
      proxy_pass http://atlas_marketing;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 90s;
    }

    location /health {
      proxy_pass http://atlas_marketing;
      access_log off;
    }
  }
}
